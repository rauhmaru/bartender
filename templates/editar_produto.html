{% extends "base.html" %}
{% block conteudo %}
<div class="card">
  <h2>Editar Produto</h2>
  <form method="post" action="{{ url_for('editar_produto', produto_id=produto_obj.id) }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="campo">
      <label for="produto">Produto</label>
      <input type="text" id="produto" name="produto"
             maxlength="{{ MAX_PRODUTO }}" required
             value="{{ form.produto }}" placeholder="Ex.: Caipirinha">
    </div>
    <div class="campo">
      <label for="tipo">Tipo</label>
      {% if tipos %}
      <select id="tipo" name="tipo" required>
        <option value="" {{ 'selected' if not form.tipo else '' }} disabled>Selecione...</option>
        {% for t in tipos %}
        <option value="{{ t['nome'] }}" {{ 'selected' if form.tipo == t['nome'] else '' }}>{{ t['nome'] }}</option>
        {% endfor %}
      </select>
      {% else %}
      <p class="vazio" style="margin:0; text-align: left;">
        Nenhum tipo cadastrado.
        <a href="{{ url_for('cadastrar_tipo') }}" style="color: var(--gold);">Cadastre um tipo de produto</a> primeiro.
      </p>
      {% endif %}
    </div>
    <div class="campo">
      <label for="volume_ml">Volume (ml)</label>
      <input type="number" id="volume_ml" name="volume_ml"
             min="0" max="{{ MAX_VOLUME }}" step="1" required
             value="{{ form.volume_ml }}" placeholder="0 a {{ MAX_VOLUME }}">
    </div>
    <div class="acoes">
      <a class="btn btn-secondary" href="{{ url_for('visualizar') }}">Cancelar</a>
      <button type="submit" class="btn btn-primary">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
