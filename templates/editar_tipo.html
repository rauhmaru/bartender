{% extends "base.html" %}
{% block conteudo %}
<div class="card">
  <h2>Editar Tipo de Produto</h2>
  <form method="post" action="{{ url_for('editar_tipo', tipo_id=tipo_obj.id) }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div class="campo">
      <label for="nome">Tipo de produto</label>
      <input type="text" id="nome" name="nome"
             maxlength="{{ MAX_TIPO }}" required
             value="{{ form.nome }}" placeholder="Ex.: Destilado">
    </div>
    <div class="acoes">
      <a class="btn btn-secondary" href="{{ url_for('cadastrar_tipo') }}">Cancelar</a>
      <button type="submit" class="btn btn-primary">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
