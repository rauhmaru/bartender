{% extends "base.html" %}
{% block conteudo %}
<div class="card">
  <h2>Cadastrar Tipo de Produto</h2>
  <form method="post" action="{{ url_for('cadastrar_tipo') }}" novalidate>
    <div class="campo">
      <label for="nome">Tipo de produto</label>
      <input type="text" id="nome" name="nome"
             maxlength="{{ MAX_TIPO }}" required
             placeholder="Ex.: Destilado">
    </div>
    <div class="acoes">
      <button type="submit" class="btn btn-primary">Salvar</button>
    </div>
  </form>
</div>

<div class="card" style="margin-top: 16px;">
  <h3 style="font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 16px;">Tipos Cadastrados</h3>
  {% if tipos %}
    {% for t in tipos %}
    <div class="inv-item">
      <div class="inv-icon">&#128218;</div>
      <div class="inv-info">
        <div class="inv-name">{{ t.nome }}</div>
        <div class="inv-detail">ID {{ "%05d"|format(t.id) }}</div>
      </div>
      <div class="inv-actions">
        <form class="form-inline" method="post"
              action="{{ url_for('remover_tipo_route', tipo_id=t.id) }}"
              onsubmit="return confirm('Remover este tipo de produto?');">
          <button type="submit" class="btn btn-danger btn-sm">Remover</button>
        </form>
      </div>
    </div>
    {% endfor %}
    <p class="vazio">{{ tipos|length }} tipo(s) cadastrado(s).</p>
  {% else %}
    <p class="vazio">Nenhum tipo cadastrado.</p>
  {% endif %}
</div>
{% endblock %}
