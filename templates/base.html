<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerenciador de Bebidas e Cocktails</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, Arial, sans-serif;
      margin: 0; background: #f4f5f7; color: #222;
    }
    header {
      background: #2c3e50; color: #fff; padding: 16px 24px;
    }
    header h1 { margin: 0; font-size: 20px; }
    nav { margin-top: 10px; }
    nav a {
      color: #cfd8e3; text-decoration: none; margin-right: 18px;
      font-weight: 600; padding-bottom: 4px;
    }
    nav a.ativo { color: #fff; border-bottom: 2px solid #1abc9c; }
    /* Menu suspenso da navegação */
    .dropdown { position: relative; display: inline-block; margin-right: 18px; }
    .dropdown > .dropbtn {
      color: #cfd8e3; font-weight: 600; cursor: pointer; padding-bottom: 4px;
      background: none; border: none; font-size: inherit; font-family: inherit;
    }
    .dropdown.ativo > .dropbtn { color: #fff; border-bottom: 2px solid #1abc9c; }
    .dropdown-conteudo {
      display: none; position: absolute; left: 0; top: 100%; margin-top: 6px;
      background: #fff; min-width: 200px; border-radius: 6px; overflow: hidden;
      box-shadow: 0 4px 12px rgba(0,0,0,.18); z-index: 10;
    }
    .dropdown:hover .dropdown-conteudo { display: block; }
    .dropdown-conteudo a {
      display: block; color: #2c3e50; padding: 10px 14px; margin: 0;
      border-bottom: 1px solid #eef1f4;
    }
    .dropdown-conteudo a:last-child { border-bottom: none; }
    .dropdown-conteudo a:hover { background: #f0f3f6; }
    main { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card {
      background: #fff; border-radius: 8px; padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    h2 { margin-top: 0; }
    .campo { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type=text], input[type=number], select, textarea {
      width: 100%; padding: 9px 10px; border: 1px solid #cbd2d9;
      border-radius: 6px; font-size: 14px; font-family: inherit;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 90px; }
    input[readonly] { background: #eef1f4; color: #555; }
    .ingrediente-linha {
      display: grid; grid-template-columns: 1fr 160px 40px; gap: 10px;
      align-items: center; margin-bottom: 10px;
    }
    .btn-remover {
      background: #e74c3c; color: #fff; border: none; border-radius: 6px;
      height: 38px; cursor: pointer; font-size: 18px; line-height: 1;
    }
    .btn-add-ing {
      background: #34495e; margin-top: 4px;
    }
    .filtro { margin-bottom: 20px; }
    .filtro fieldset {
      border: 1px solid #dfe4ea; border-radius: 8px; padding: 14px 16px;
    }
    .filtro legend { font-weight: 600; padding: 0 6px; color: #2c3e50; }
    .filtro-ingredientes {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 14px; max-height: 220px; overflow-y: auto; padding: 4px 2px;
    }
    .filtro-item {
      display: flex; align-items: center; gap: 8px; font-weight: 400; margin: 0;
    }
    .filtro-item input { width: auto; }
    .filtro-modo {
      margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px 16px;
      align-items: center; font-size: 14px;
    }
    .filtro-modo span { font-weight: 600; }
    .filtro-modo label { font-weight: 400; margin: 0; display: inline-flex; gap: 6px; }
    .filtro-modo input { width: auto; }
    .filtro-acoes { margin-top: 14px; display: flex; gap: 10px; }
    .acoes { text-align: right; margin-top: 8px; }
    button, .btn {
      background: #1abc9c; color: #fff; border: none; padding: 9px 18px;
      border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block;
    }
    button.secundario, .btn.secundario { background: #95a5a6; }
    button:hover, .btn:hover { opacity: .92; }
    .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-weight: 600; }
    .flash.sucesso { background: #e8f8f2; color: #14785f; border: 1px solid #a8e6cf; }
    .flash.erro { background: #fdecea; color: #a4271c; border: 1px solid #f5c6c2; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eceff2; }
    th { background: #f0f3f6; }
    td.num, th.num { text-align: right; }
    td.center, th.center { text-align: center; }
    .vazio { color: #777; padding: 18px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Gerenciador de Bebidas e Cocktails</h1>
    <nav>
      <div class="dropdown {{ 'ativo' if ativo in ['cadastrar', 'visualizar'] else '' }}">
        <button type="button" class="dropbtn">Produtos &#9662;</button>
        <div class="dropdown-conteudo">
          <a href="{{ url_for('cadastrar') }}">Cadastrar produtos</a>
          <a href="{{ url_for('visualizar') }}">Listar produtos</a>
        </div>
      </div>
      <div class="dropdown {{ 'ativo' if ativo in ['cocktails', 'ver_cocktails'] else '' }}">
        <button type="button" class="dropbtn">Receitas &#9662;</button>
        <div class="dropdown-conteudo">
          <a href="{{ url_for('adicionar_cocktail') }}">Cadastrar receitas</a>
          <a href="{{ url_for('visualizar_cocktails') }}">Visualizar receitas</a>
        </div>
      </div>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for categoria, msg in messages %}
        <div class="flash {{ categoria }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block conteudo %}{% endblock %}
  </main>
</body>
</html>
